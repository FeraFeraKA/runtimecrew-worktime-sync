spring.application.name=crew

# Local start from IntelliJ/Gradle uses PostgreSQL from docker-compose on host port 5433.
# Docker backend overrides these values with SPRING_DATASOURCE_* environment variables.
#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/crew_db}
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crew_user}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crew_password}
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
