services:
  database:
    image: postgres:16
    container_name: crew-uuid-postgres
    environment:
      POSTGRES_DB: crew_db
      POSTGRES_USER: crew_user
      POSTGRES_PASSWORD: crew_password
    ports:
      - "5433:5432"
    volumes:
      - crew_uuid_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crew_user -d crew_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crew-net

  backend:
    build: .
    container_name: crew-uuid-backend
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/crew_db
      SPRING_DATASOURCE_USERNAME: crew_user
      SPRING_DATASOURCE_PASSWORD: crew_password
    networks:
      - crew-net

volumes:
  crew_uuid_postgres_data:
    name: crew_uuid_postgres_data

networks:
  crew-net:
    driver: bridge
